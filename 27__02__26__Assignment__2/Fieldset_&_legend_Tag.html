<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FieldSet and Legend</title>
</head>
<body>
    <h1>LoginForm</h1>
    
        <form action="">
            <fieldset >
            <legend> Student Detail : </legend>
             <label for="first">FirstName:  <input type="text" id="first" name="FirstName"/></label><br>
        
        <label for="last">Last Name: <input type="text" id="last" name="LastName"/></label><br>

        <label for="user">UserName: <input type="text" id="user" name="userName" required/> </label><br>
        Gender:
        <label for="Male"><input type="radio" name="Gender" id="Male"/> Male</label>
        <label for="Female"><input type="radio" name="Gender" id="Female"/> Female</label><br>

        Known Languages:
        <label for="Hindi">Hindi<input type="checkbox" id="Hindi" ></label>
        <label for="English">English<input type="checkbox" id="English" ></label>
        <label for="Marathi">Marathi<input type="checkbox" id="Marathi" ></label><br>

        <label for="email">Email: <input type="email" id="email" name="email" required/></label><br>

        <label for="num">Phone Number :<input type="number" id="num" name="MobileNumber" minlength="10" maxlength="10"/></label><br>
        
        <label for="password">Password: <input type="password" id="pass" name="password" REQUIRED minlength="8" maxlength="15"/></label><br>
        
        <label for="repass">Re-enter Password: <input type="password" id="repass" name="re-enter_Password"/></label><br>

        <button>Register</button>
        </fieldset>
        
    </form>
    
    

</body>
</html>
