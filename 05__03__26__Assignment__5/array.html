<!DOCTYPE html>
<html>
<head>
    <title>Array Operations</title>
    <style>
        body{
            font-family: Arial;
            margin:40px;
        }
        input{
            margin:5px;
            padding:5px;
        }
        button{
            margin:5px;
            padding:6px 10px;
        }
        p{
            font-weight:bold;
        }
    </style>
</head>
<body>

<h2>Array Operations</h2>

Enter Value:
<input type="text" id="value">
<button onclick="checkValue()">Check Value</button>

<p id="result"></p>

<hr>

<button onclick="addToEnd()">Add To End</button>

<hr>

Insert at Index:
<input type="number" id="insertIndex">
<button onclick="insertAtIndex()">Insert</button>

<p id="insertResult"></p>

<hr>

Remove at Index:
<input type="number" id="removeIndex">
<button onclick="removeAtIndex()">Remove</button>

<p id="removeResult"></p>

<script>

let arr=[10,20,30,40,50];

function checkValue(){
    let value=document.getElementById("value").value;

    if(arr.includes(value)){
        document.getElementById("result").innerHTML="Value Found";
    }
    else{
        document.getElementById("result").innerHTML="Value Not Found";
    }
}

function addToEnd(){
    let value=document.getElementById("value").value;

    if(value==""){
        alert("Enter value");
        return;
    }

    arr.push(value);

    document.getElementById("result").innerHTML="Array: "+arr;
}

function insertAtIndex(){
    let value=document.getElementById("value").value;
    let index=parseInt(document.getElementById("insertIndex").value);

    if(isNaN(index)||index<0||index>arr.length){
        document.getElementById("insertResult").innerHTML="Invalid Index";
        return;
    }

    arr.splice(index,0,value);

    document.getElementById("insertResult").innerHTML="Array: "+arr;
}

function removeAtIndex(){
    let index=parseInt(document.getElementById("removeIndex").value);

    if(isNaN(index)||index<0||index>=arr.length){
        document.getElementById("removeResult").innerHTML="Invalid Index";
        return;
    }

    arr.splice(index,1);

    document.getElementById("removeResult").innerHTML="Array: "+arr;
}

</script>

</body>
</html>
